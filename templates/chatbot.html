<!DOCTYPE html>
<html>
<head>
    <title>Election Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🤖 Election Assistant Chatbot</h1>

    <form method="POST">
        <input type="text" name="user_input" placeholder="Ask something..." required style="padding:10px; width:70%;">
        <br><br>
        <button class="button" type="submit">Ask</button>
    </form>

    {% if response %}
        <p><b>Answer:</b> {{ response }}</p>
    {% endif %}

    <br>
    <a href="/">
        <button class="button">⬅ Back to Home</button>
    </a>
</div>

</body>
</html>
